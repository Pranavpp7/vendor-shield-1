name: Nightly Evals

# The LLM quality gate: golden-dataset scoring agreement (with false-PASS
# and citation-faithfulness gates) plus the DeepEval judge suite.  Needs a
# real LLM key and a Qdrant instance, so it runs nightly + on demand — not
# per PR (per-PR CI covers the deterministic tests for free).
#
# LLM key — set ONE of these repo secrets:
#   GROQ_API_KEY        → $0 nightly runs on the certified Groq free tier
#                         (base URL + model are mapped automatically)
#   OPENROUTER_API_KEY  → paid OpenRouter primary (default model)
# Optional repo secrets: FALLBACK_API_KEY (failover provider),
#                        LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY
#                        (traces the eval runs too)

on:
  schedule:
    - cron: "0 7 * * *"  # nightly, 07:00 UTC ≈ 1–2 am Central
  workflow_dispatch: {}

concurrency:
  group: nightly-evals
  cancel-in-progress: false

jobs:
  evals:
    name: Golden gate + judge suite
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    env:
      # The app reads OPENROUTER_* as its primary-provider slots; when the
      # GROQ_API_KEY secret exists it wins and the Groq endpoint + certified
      # free model are filled in automatically.
      OPENROUTER_API_KEY: ${{ secrets.GROQ_API_KEY || secrets.OPENROUTER_API_KEY }}
      OPENROUTER_BASE_URL: ${{ secrets.GROQ_API_KEY && 'https://api.groq.com/openai/v1' || 'https://openrouter.ai/api/v1' }}
      OPENROUTER_MODEL: ${{ secrets.GROQ_API_KEY && 'llama-3.3-70b-versatile' || 'meta-llama/llama-3.3-70b-instruct' }}
      # Groq free tier is 12k tokens/min — lower concurrency so calls queue
      # instead of exhausting retries (verified live: concurrency 4 degraded
      # 2/50 controls to the system-failure fallback).
      LLM_CONCURRENCY: ${{ secrets.GROQ_API_KEY && '2' || '4' }}
      FALLBACK_API_KEY: ${{ secrets.FALLBACK_API_KEY }}
      # This project's Langfuse account is US-region; override with repo
      # variable LANGFUSE_HOST if that ever changes.
      LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST || 'https://us.cloud.langfuse.com' }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      QDRANT_HOST: localhost
      QDRANT_PORT: "6333"
    steps:
      - uses: actions/checkout@v4

      - name: Require LLM key
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::No LLM key — set repo secret GROQ_API_KEY (free tier) or OPENROUTER_API_KEY (paid)."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Cache embedding model (BGE-large, ~1.3 GB)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-large-en-v1.5

      - name: Install dependencies (incl. eval group)
        run: uv sync --frozen --group eval

      - name: Golden gate (agreement, false-PASS, citation faithfulness)
        run: uv run --no-sync python evals/run_evals.py

      - name: Judge suite (DeepEval G-Eval on reasoning quality)
        run: uv run --no-sync pytest evals/test_judge.py -q

      - name: Upload eval artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: backend/evals/last_run_results.json
          if-no-files-found: ignore
