version: "3.8"

# VendorShield infrastructure
#
# Dev (Qdrant only, run backend/frontend locally):
#     docker-compose up -d
#
# Full stack (app + Qdrant in containers):
#     OPENROUTER_API_KEY=sk-... docker compose --profile full up -d
#     → http://localhost:8000
#
# Qdrant dashboard: http://localhost:6333/dashboard

services:
  qdrant:
    # Pinned to match qdrant-client 1.17.1 in backend/uv.lock —
    # bump both together when upgrading.
    image: qdrant/qdrant:v1.17.1
    container_name: vendorshield-qdrant
    ports:
      - "6333:6333"   # HTTP API + Dashboard
      - "6334:6334"   # gRPC (used by qdrant-client internally)
    volumes:
      - qdrant_data:/qdrant/storage   # persist vectors across restarts
    restart: unless-stopped

  app:
    # Only starts with:  docker compose --profile full up
    profiles: ["full"]
    build: .
    container_name: vendorshield-app
    ports:
      - "8000:8000"
    environment:
      QDRANT_HOST: qdrant
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      API_KEY: ${API_KEY:-}
    volumes:
      - vendorshield_data:/app/backend/data   # SQLite + uploads survive restarts
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
  vendorshield_data:
