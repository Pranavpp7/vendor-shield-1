version: "3.8"

# VendorShield infrastructure — Qdrant vector database
# Run: docker-compose up -d
# Dashboard: http://localhost:6333/dashboard

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vendorshield-qdrant
    ports:
      - "6333:6333"   # HTTP API + Dashboard
      - "6334:6334"   # gRPC (used by qdrant-client internally)
    volumes:
      - qdrant_data:/qdrant/storage   # persist vectors across restarts
    restart: unless-stopped

volumes:
  qdrant_data:
